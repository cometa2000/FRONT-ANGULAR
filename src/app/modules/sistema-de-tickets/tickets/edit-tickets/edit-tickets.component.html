<!-- MODAL: Editar Ticket — NgbModal (sin div.modal wrapper, NgbModal lo provee) -->
<div class="modal-header py-4">
  <div>
    <h4 class="modal-title fw-bold mb-0">
      <i class="ki-duotone ki-pencil fs-2 me-2 text-warning">
        <span class="path1"></span><span class="path2"></span>
      </i>
      Editar Ticket
    </h4>
    <span class="text-muted fs-7">{{ TICKET_SELECTED?.folio }} — {{ TICKET_SELECTED?.asunto }}</span>
  </div>
  <button type="button" class="btn btn-sm btn-icon btn-light" (click)="modal.dismiss()">
    <i class="ki-duotone ki-cross fs-3"><span class="path1"></span><span class="path2"></span></i>
  </button>
</div>

<form [formGroup]="form" (ngSubmit)="store()">
  <div class="modal-body py-4">

    <!-- Asunto -->
    <div class="mb-5">
      <label class="form-label required fw-semibold fs-6">Asunto</label>
      <input type="text"
             class="form-control form-control-solid"
             formControlName="asunto"
             [class.is-invalid]="form.get('asunto')?.invalid && form.get('asunto')?.touched" />
      <div class="invalid-feedback">El asunto es obligatorio (máx. 255 caracteres).</div>
    </div>

    <!-- Descripción -->
    <div class="mb-5">
      <label class="form-label required fw-semibold fs-6">Descripción</label>
      <textarea class="form-control form-control-solid"
                rows="5"
                formControlName="descripcion"
                [class.is-invalid]="form.get('descripcion')?.invalid && form.get('descripcion')?.touched"></textarea>
      <div class="invalid-feedback">La descripción es obligatoria.</div>
    </div>

    <!-- Prioridad + Categoría + Fecha -->
    <div class="row g-4 mb-5">
      <div class="col-md-4">
        <label class="form-label fw-semibold fs-6">Prioridad</label>
        <div class="d-flex gap-2">
          <button *ngFor="let p of prioridades"
                  type="button"
                  class="btn btn-sm flex-grow-1"
                  [class.btn-warning]="form.get('prioridad')?.value === p.value"
                  [class]="form.get('prioridad')?.value !== p.value ? 'btn-light-' + p.class : ''"
                  (click)="form.patchValue({ prioridad: p.value })">
            {{ p.label }}
          </button>
        </div>
      </div>
      <div class="col-md-4">
        <label class="form-label fw-semibold fs-6">Categoría</label>
        <select class="form-select form-select-solid" formControlName="categoria">
          <option [ngValue]="null">Sin categoría</option>
          <option *ngFor="let cat of categorias" [value]="cat">{{ cat }}</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label fw-semibold fs-6">Fecha Límite</label>
        <input type="date" class="form-control form-control-solid" formControlName="fecha_limite" />
      </div>
    </div>

    <!-- Adjuntos existentes (solo visualización) -->
    <div *ngIf="TICKET_SELECTED?.attachments && TICKET_SELECTED.attachments.length > 0" class="mb-4">
      <label class="form-label fw-semibold fs-6 text-muted">Adjuntos actuales</label>
      <div class="d-flex flex-wrap gap-2">
        <a *ngFor="let adj of TICKET_SELECTED.attachments"
           [href]="adj.file_url" target="_blank"
           class="btn btn-sm btn-light d-flex align-items-center gap-2">
          <i class="ki-duotone ki-file fs-5 text-primary"><span class="path1"></span><span class="path2"></span></i>
          <span class="fs-8 text-truncate" style="max-width:120px;">{{ adj.nombre }}</span>
        </a>
      </div>
    </div>

    <!-- Nuevos adjuntos -->
    <div class="mb-2">
      <label class="form-label fw-semibold fs-6">Agregar nuevos archivos</label>
      <label class="d-flex align-items-center gap-2 p-3 border border-dashed rounded cursor-pointer bg-light-warning border-warning">
        <i class="ki-duotone ki-file-up fs-2 text-warning"><span class="path1"></span><span class="path2"></span></i>
        <span class="text-muted fs-7">Seleccionar archivos adicionales</span>
        <input type="file" class="d-none" multiple (change)="onFileChange($event)" />
      </label>
      <div *ngIf="adjuntosNuevos.length > 0" class="mt-2 d-flex flex-column gap-2">
        <div *ngFor="let f of adjuntosNuevos; let i = index"
             class="d-flex align-items-center justify-content-between p-2 bg-light rounded">
          <div class="d-flex align-items-center gap-2">
            <i class="ki-duotone ki-file fs-4 text-warning"><span class="path1"></span><span class="path2"></span></i>
            <span class="fs-7 text-truncate" style="max-width:300px;">{{ f.name }}</span>
            <span class="text-muted fs-9">{{ formatFileSize(f.size) }}</span>
          </div>
          <button type="button" class="btn btn-xs btn-icon btn-light-danger" (click)="removeAdjunto(i)">
            <i class="ki-duotone ki-cross fs-5"><span class="path1"></span><span class="path2"></span></i>
          </button>
        </div>
      </div>
    </div>

  </div>

  <div class="modal-footer py-3">
    <button type="button" class="btn btn-light" (click)="modal.dismiss()">Cancelar</button>
    <button type="submit"
            class="btn btn-warning d-flex align-items-center gap-2"
            [disabled]="form.invalid || isLoading">
      <span *ngIf="isLoading" class="spinner-border spinner-border-sm"></span>
      <i *ngIf="!isLoading" class="ki-duotone ki-check fs-5"><span class="path1"></span><span class="path2"></span></i>
      {{ isLoading ? 'Guardando...' : 'Guardar Cambios' }}
    </button>
  </div>
</form>
